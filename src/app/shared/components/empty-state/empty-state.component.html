<div class="empty-state-card text-center p-6">
  <div class="empty-icon-wrapper mb-4">
    <i [class]="icon"></i>
  </div>
  <h3 class="mb-2">{{ title }}</h3>
  <p class="text-slate-500 mb-6">{{ message }}</p>
  @if (actionText) {
    <button class="btn btn-primary" [routerLink]="actionLink">
      {{ actionText }}
    </button>
  }
</div>
