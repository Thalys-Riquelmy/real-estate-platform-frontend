<div class="custom-page-header flex justify-between items-center mb-6">
  <div class="header-content">
    <h1 class="m-0">{{ title }}</h1>
    @if (subtitle) {
      <p class="text-slate-500 mt-1">{{ subtitle }}</p>
    }
  </div>
  
  @if (buttonText) {
    <button class="btn btn-primary" (click)="buttonClick.emit()" [disabled]="buttonDisabled">
      <i [class]="buttonIcon"></i>
      {{ buttonText }}
    </button>
  }
</div>
